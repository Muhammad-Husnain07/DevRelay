name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check for console.log
        run: |
          if grep -r "console.log" src/ --include="*.js" 2>/dev/null; then
            echo "ERROR: Found console.log statements in src/"
            exit 1
          fi
          echo "No console.log statements found in src/"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd mongo --eval "db.adminCommand('ping')"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        env:
          JWT_SECRET: test-secret
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/devrelay-test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: npm test -- --coverage --ci --forceExit

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Publish to Code Coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build . --tag devrelay:${{ github.sha }}

      - name: Run container health check
        run: |
          docker run -d --name devrelay-test -p 3001:3000 \
            -e JWT_SECRET=test-secret \
            -e NODE_ENV=production \
            -e MONGODB_URI=mongodb://host.docker.internal:27017/devrelay \
            -e REDIS_HOST=host.docker.internal \
            --add-host=host.docker.internal:host-gateway \
            devrelay:${{ github.sha }}

          echo "Waiting for container to start..."
          sleep 20

          echo "Checking health endpoint..."
          curl -f http://localhost:3001/api/health || exit 1

          docker stop devrelay-test
          docker rm devrelay-test

  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/devrelay
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=true

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}